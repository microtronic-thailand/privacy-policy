<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7fafc;
        color: #111827;
        line-height: 1.75;
      }
      .page-wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }
      .brand h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .brand p {
        margin: 0;
        color: #6b7280;
      }
      .lang-switcher {
        display: flex;
        gap: 0.75rem;
      }
      .lang-switcher button {
        border: 1px solid #d1d5db;
        background: #fff;
        color: #111827;
        padding: 0.65rem 0.95rem;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .lang-switcher button.active,
      .lang-switcher button:hover {
        background: #111827;
        color: #fff;
        border-color: #111827;
      }
      .content {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.06);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
      a {
        color: #1d4ed8;
      }
      @media (max-width: 640px) {
        header {
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <header>
        <div class="brand">
          <h1>Privacy Policy</h1>
          <p>GitHub Pages site for this repository</p>
        </div>
        <nav class="lang-switcher" aria-label="Language switcher">
          <button id="lang-en">English</button>
          <button id="lang-th">ไทย</button>
        </nav>
      </header>
      <main class="content" id="content">
        <p>Loading content…</p>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const contentEl = document.getElementById('content');
      const enBtn = document.getElementById('lang-en');
      const thBtn = document.getElementById('lang-th');
      const files = {
        en: 'README.md',
        th: 'th.md'
      };
      function setActive(language) {
        enBtn.classList.toggle('active', language === 'en');
        thBtn.classList.toggle('active', language === 'th');
      }
      function renderMarkdown(text) {
        contentEl.innerHTML = marked.parse(text);
      }
      async function loadPage(language) {
        setActive(language);
        const file = files[language] || files.en;
        try {
          const response = await fetch(file);
          if (!response.ok) throw new Error('Failed to load file');
          const markdown = await response.text();
          renderMarkdown(markdown);
          history.replaceState(null, '', `?lang=${language}`);
        } catch (error) {
          contentEl.innerHTML = '<p>Unable to load privacy policy content.</p>';
          console.error(error);
        }
      }
      enBtn.addEventListener('click', () => loadPage('en'));
      thBtn.addEventListener('click', () => loadPage('th'));
      const urlParams = new URLSearchParams(window.location.search);
      const locale = urlParams.get('lang') === 'th' ? 'th' : 'en';
      loadPage(locale);
    </script>
  </body>
</html>
